    <main class="history-wrapper">

        <div id="historyGrid" class="history-grid"></div>

    <script>
        class ParticleEngine {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.init();
                this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            init() {
                this.particles = [];
                const count = window.innerWidth < 768 ? 35 : 80;
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.8, vy: (Math.random() - 0.5) * 0.8,
                        radius: Math.random() * 2.5 + 1
                    });
                }
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
                this.ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 0, 0, 0.15)';
                this.ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.05)';

                for (let i = 0; i < this.particles.length; i++) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); this.ctx.fill();

                    for (let j = i + 1; j < this.particles.length; j++) {
                        const p2 = this.particles[j];
                        const dx = p.x - p2.x; const dy = p.y - p2.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 120) {
                            this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y); this.ctx.lineTo(p2.x, p2.y); this.ctx.stroke();
                        }
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ParticleEngine();

            const menuBtn = document.getElementById('menuTriggerBtn');
            const dropdown = document.getElementById('mainDropdown');
            menuBtn.addEventListener('click', () => dropdown.classList.toggle('active'));
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) dropdown.classList.remove('active');
            });

            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
            themeBtn.addEventListener('click', () => {
                const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
                localStorage.setItem('theme', isLight ? 'dark' : 'light');
            });

            const dbUrl = 'https://ncqufcoprwkpjredhlxo.supabase.co'; 
            const dbKey = 'sb_publishable_OxzXsblTjBO1FMcKCbhzKQ_w4zonqru';
            const db = window.supabase.createClient(dbUrl, dbKey);
            const grid = document.getElementById('historyGrid');
            const promptBox = document.getElementById('authPrompt');

            async function buildGrid() {
                const { data: { session } } = await db.auth.getSession();
                
                if (!session) {
                    promptBox.classList.remove('hidden');
                    return;
                }

                const initials = session.user.email.substring(0,2).toUpperCase();
                document.getElementById('authContainer').innerHTML = `
                    <div class="user-pill dropdown-wrapper">
                        <div class="avatar-circle">${initials}</div>
                        <span class="user-email-truncate">${session.user.email}</span>
                        <button class="btn btn-outline btn-sm" style="margin-left:8px" id="logoutBtn">Log Out</button>
                    </div>
                `;
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    await db.auth.signOut();
                    window.location.reload();
                });

                grid.innerHTML = Array(8).fill(`
                    <div class="video-card skeleton">
                        <div class="skeleton-img"></div>
                        <div class="video-info">
                            <div class="skeleton-text title"></div>
                            <div class="skeleton-text"></div>
                            <div class="skeleton-text short"></div>
                        </div>
                    </div>
                `).join('');

                try {
                    const { data, error } = await db.from('downloads').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
                    if (error) throw error;

                    if (!data.length) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg>
                                <h3>No videos yet!</h3>
                                <p>You haven't downloaded any videos yet. Go back home to grab one!</p>
                            </div>
                        `;
                        return;
                    }

                    grid.innerHTML = data.map(item => `
                        <div class="video-card">
                            <div class="video-thumb-wrapper">
                                <img src="${item.thumbnail}" alt="Media Cover" class="video-thumb" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMzMzMiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiM2NjYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5ObyBJbWFnZTwvdGV4dD48L3N2Zz4='">
                                <div class="media-overlay">
                                    <a href="${item.video_url}" target="_blank" class="btn btn-primary btn-sm" style="text-decoration:none;">View Original Post</a>
                                </div>
                            </div>
                            <div class="video-info">
                                <h3>${item.creator}</h3>
                                <p>${item.description || 'No description provided.'}</p>
                                <div class="card-footer">
                                    <span class="timestamp">${new Date(item.created_at).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');

                } catch (e) {
                    grid.innerHTML = `<div class="empty-state"><h3 style="color:var(--error-500);">Oops! Something went wrong.</h3><p>${e.message}</p></div>`;
                }
            }
            
            buildGrid();
        });
    </script>
</body>
</html>
