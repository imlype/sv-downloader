<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span class="brand-text">SV Downloader</span>
        </a>
        
        <div class="nav-controls">
            <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
                <svg class="sun-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            
            <div id="authContainer">
                <a href="/login" class="btn btn-outline">Log In</a>
            </div>

            <div class="dropdown-wrapper">
                <button class="icon-btn" id="menuTriggerBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div id="mainDropdown" class="dropdown-menu">
                    <div class="dropdown-header">Menu</div>
                    <a href="/" class="dropdown-item">Download Video</a>
                    <a href="/recent" class="dropdown-item">My Videos</a>
                    <div class="dropdown-divider"></div>
                    <a href="https://github.com/imlype" target="_blank" class="dropdown-item">Developer Github</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="history-wrapper">
        <div class="history-header" style="margin-bottom: 2rem;">
            <h1 class="page-title">My Videos</h1>
            <p class="page-subtitle">All your previously downloaded videos are saved right here.</p>
        </div>

        <div id="authPrompt" class="empty-state hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h3>You need to log in</h3>
            <p style="margin-bottom: 1.5rem;">Please log in or create an account to view your saved videos.</p>
            <a href="/login" class="btn btn-primary">Go to Log In</a>
        </div>

        <div id="historyGrid" class="history-grid"></div>
    </main>

    <script>
        class ToastSystem {
            constructor() { this.container = document.getElementById('toastContainer'); }
            show(msg, type = 'info', ms = 4000) {
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                t.innerHTML = `
                    <div class="toast-content">
                        <div class="toast-title">${type === 'error' ? 'Error' : type === 'success' ? 'Success' : 'Notice'}</div>
                        <div class="toast-msg">${msg}</div>
                    </div>
                    <button class="toast-close">✕</button>
                    <div class="toast-progress"></div>
                `;
                this.container.appendChild(t);
                void t.offsetWidth; t.classList.add('visible');

                const bar = t.querySelector('.toast-progress');
                bar.style.transition = `width ${ms}ms linear`; bar.style.width = '0%';
                
                const remove = () => { t.classList.remove('visible'); setTimeout(() => t.remove(), 300); };
                t.querySelector('.toast-close').onclick = remove;
                setTimeout(remove, ms);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toast = new ToastSystem();

            const menuBtn = document.getElementById('menuTriggerBtn');
            const dropdown = document.getElementById('mainDropdown');
            menuBtn.addEventListener('click', () => dropdown.classList.toggle('active'));
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) dropdown.classList.remove('active');
            });

            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            });

            const dbUrl = 'https://ncqufcoprwkpjredhlxo.supabase.co'; 
            const dbKey = 'sb_publishable_OxzXsblTjBO1FMcKCbhzKQ_w4zonqru';
            const db = window.supabase.createClient(dbUrl, dbKey);
            const grid = document.getElementById('historyGrid');
            const promptBox = document.getElementById('authPrompt');

            async function buildGrid() {
                const { data: { session } } = await db.auth.getSession();
                
                if (!session) {
                    promptBox.classList.remove('hidden');
                    return;
                }

                const initials = session.user.email.substring(0,2).toUpperCase();
                document.getElementById('authContainer').innerHTML = `
                    <div class="user-pill">
                        <div class="avatar-circle">${initials}</div>
                        <span class="user-email-truncate">${session.user.email}</span>
                        <button class="btn btn-outline btn-sm" style="margin-left:10px; border:none;" id="logoutBtn">Log Out</button>
                    </div>
                `;
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    await db.auth.signOut();
                    window.location.reload();
                });

                grid.innerHTML = Array(8).fill(`
                    <div class="video-card skeleton">
                        <div class="skeleton-img"></div>
                        <div class="video-info">
                            <div class="skeleton-text title"></div>
                            <div class="skeleton-text"></div>
                            <div class="skeleton-text short"></div>
                        </div>
                    </div>
                `).join('');

                try {
                    const { data, error } = await db.from('downloads').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
                    if (error) throw error;

                    if (!data.length) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg>
                                <h3>No videos yet!</h3>
                                <p style="margin-bottom: 1.5rem;">You haven't downloaded any videos yet. Go back home to grab one!</p>
                                <a href="/" class="btn btn-primary">Go Home</a>
                            </div>
                        `;
                        return;
                    }

                    grid.innerHTML = data.map(item => `
                        <div class="video-card">
                            <div class="video-thumb-wrapper">
                                <img src="${item.thumbnail}" alt="Media Cover" class="video-thumb" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMzMzMiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiM2NjYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5ObyBJbWFnZTwvdGV4dD48L3N2Zz4='">
                            </div>
                            <div class="video-info">
                                <h3>${item.creator}</h3>
                                <p>${item.description || 'No description provided.'}</p>
                                <div class="card-footer">
                                    <span class="timestamp">${new Date(item.created_at).toLocaleDateString()}</span>
                                    <a href="${item.video_url}" target="_blank" class="btn btn-outline btn-sm">View Original</a>
                                </div>
                            </div>
                        </div>
                    `).join('');

                } catch (e) {
                    grid.innerHTML = `<div class="empty-state"><h3 style="color:var(--error-500);">Oops! Something went wrong.</h3><p>${e.message}</p></div>`;
                }
            }
            
            buildGrid();
        });
    </script>
</body>
</html>
