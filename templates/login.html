<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | SV Downloader Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=101">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <canvas id="particleCanvas" class="background-canvas"></canvas>
    <div id="toastContainer" class="toast-container"></div>

    <nav class="top-nav">
        <a href="/" class="nav-brand">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#brandGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span class="brand-text">SV Downloader</span>
        </a>
        
        <div class="nav-controls">
            <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
                <svg class="sun-icon hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="auth-card glass-panel">
            <h2 id="authTitle">Welcome Back 👋</h2>
            <p id="authSubtitle">Log in to view and save your downloaded videos.</p>
            
            <div class="auth-form">
                <div class="input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="authEmail" class="custom-input" placeholder="Email Address" required autocomplete="email">
                </div>
                
                <div class="input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="authPassword" class="custom-input" placeholder="Password" required autocomplete="current-password">
                </div>

                <button id="authSubmitBtn" class="btn btn-primary btn-large full-width mt-4">
                    <span class="btn-text">Log In</span>
                    <div class="loader-spinner hidden"></div>
                </button>
            </div>

            <div class="divider-text"><span>OR CONTINUE WITH</span></div>
            
            <button class="google-btn" id="googleAuthBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google Log In
            </button>

            <p class="auth-switch-text">
                <span id="authSwitchPrompt">Don't have an account?</span> 
                <button class="text-btn" id="authSwitchAction">Sign Up</button>
            </p>
        </div>
    </div>

    <script>
        class ParticleEngine {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.init();
                this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            init() {
                this.particles = [];
                const count = window.innerWidth < 768 ? 35 : 80;
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.8, vy: (Math.random() - 0.5) * 0.8,
                        radius: Math.random() * 2.5 + 1
                    });
                }
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
                this.ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 0, 0, 0.15)';
                this.ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.05)';

                for (let i = 0; i < this.particles.length; i++) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); this.ctx.fill();

                    for (let j = i + 1; j < this.particles.length; j++) {
                        const p2 = this.particles[j];
                        const dx = p.x - p2.x; const dy = p.y - p2.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 120) {
                            this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y); this.ctx.lineTo(p2.x, p2.y); this.ctx.stroke();
                        }
                    }
                }
            }
        }

        class ToastSystem {
            constructor() { this.container = document.getElementById('toastContainer'); }
            show(msg, type = 'info', ms = 5000) {
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                let icon = '';
                if(type === 'success') icon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                else if(type === 'error') icon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                else icon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';

                t.innerHTML = `
                    <div class="toast-icon">${icon}</div>
                    <div class="toast-content">
                        <div class="toast-title">${type.toUpperCase()}</div>
                        <div class="toast-msg">${msg}</div>
                    </div>
                    <button class="toast-close">✕</button>
                    <div class="toast-progress"></div>
                `;
                this.container.appendChild(t);
                void t.offsetWidth; t.classList.add('visible');

                const bar = t.querySelector('.toast-progress');
                bar.style.transition = `width ${ms}ms linear`; bar.style.width = '0%';
                
                const remove = () => { t.classList.remove('visible'); setTimeout(() => t.remove(), 400); };
                t.querySelector('.toast-close').onclick = remove;
                setTimeout(remove, ms);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ParticleEngine();
            const toast = new ToastSystem();
            let isLoginMode = true;

            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
            themeBtn.addEventListener('click', () => {
                const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
                localStorage.setItem('theme', isLight ? 'dark' : 'light');
            });

            const switchBtn = document.getElementById('authSwitchAction');
            switchBtn.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                document.getElementById('authTitle').innerText = isLoginMode ? "Welcome Back 👋" : "Create Account ✨";
                document.getElementById('authSubtitle').innerText = isLoginMode ? "Log in to view and save your downloaded videos." : "Create an account to keep track of your videos.";
                document.querySelector('#authSubmitBtn .btn-text').innerText = isLoginMode ? "Log In" : "Sign Up";
                document.getElementById('authSwitchPrompt').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
                switchBtn.innerText = isLoginMode ? "Sign Up" : "Log In";
            });

            const dbUrl = 'https://ncqufcoprwkpjredhlxo.supabase.co'; 
            const dbKey = 'sb_publishable_OxzXsblTjBO1FMcKCbhzKQ_w4zonqru';
            const db = window.supabase.createClient(dbUrl, dbKey);

            function toggleBtnLoading(btn, loading) {
                btn.disabled = loading;
                btn.querySelector('.btn-text').classList.toggle('hidden', loading);
                btn.querySelector('.loader-spinner').classList.toggle('hidden', !loading);
            }

            document.getElementById('authSubmitBtn').addEventListener('click', async (e) => {
                const email = document.getElementById('authEmail').value.trim();
                const pass = document.getElementById('authPassword').value;
                const btn = e.currentTarget;
                
                if (!email || !pass) return toast.show("Please enter your email and password.", "error");

                toggleBtnLoading(btn, true);

                const { error } = isLoginMode 
                    ? await db.auth.signInWithPassword({ email, password: pass })
                    : await db.auth.signUp({ email, password: pass });

                toggleBtnLoading(btn, false);

                if (error) {
                    toast.show(error.message, "error");
                } else {
                    toast.show("Success! Taking you back home...", "success");
                    setTimeout(() => { window.location.href = "/"; }, 1200);
                }
            });

            document.getElementById('googleAuthBtn').addEventListener('click', async () => {
                toast.show("Connecting to Google...", "info");
                const { error } = await db.auth.signInWithOAuth({ 
                    provider: 'google',
                    options: { redirectTo: window.location.origin } 
                });
                if (error) toast.show(`Error: ${error.message}`, "error");
            });
        });
    </script>
</body>
</html>
