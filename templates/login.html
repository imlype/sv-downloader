<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | SV Downloader Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=102">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>

    <nav class="top-nav">
        <a href="/" class="nav-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span class="brand-text">SV Downloader</span>
        </a>
        
        <div class="nav-controls">
            <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
                <svg class="sun-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="main-wrapper">
        <div class="auth-card app-card">
            <h2 id="authTitle">Welcome Back</h2>
            <p id="authSubtitle">Log in to view and save your downloaded videos.</p>
            
            <div class="auth-form">
                <div class="input-wrapper">
                    <input type="email" id="authEmail" class="custom-input" placeholder="Email Address" required autocomplete="email">
                </div>
                
                <div class="input-wrapper mt-2">
                    <input type="password" id="authPassword" class="custom-input" placeholder="Password" required autocomplete="current-password">
                </div>

                <button id="authSubmitBtn" class="btn btn-primary btn-large full-width mt-4">
                    <span class="btn-text">Log In</span>
                    <div class="loader-spinner hidden"></div>
                </button>
            </div>

            <div class="auth-divider"><span>OR</span></div>
            
            <button class="google-btn" id="googleAuthBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Log in with Google
            </button>

            <p class="auth-switch-text">
                <span id="authSwitchPrompt">Don't have an account?</span> 
                <button class="text-btn" id="authSwitchAction">Sign Up</button>
            </p>
        </div>
    </main>

    <script>
        class ToastSystem {
            constructor() { this.container = document.getElementById('toastContainer'); }
            show(msg, type = 'info', ms = 4000) {
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                t.innerHTML = `
                    <div class="toast-content">
                        <div class="toast-title">${type === 'error' ? 'Error' : type === 'success' ? 'Success' : 'Notice'}</div>
                        <div class="toast-msg">${msg}</div>
                    </div>
                    <button class="toast-close">✕</button>
                    <div class="toast-progress"></div>
                `;
                this.container.appendChild(t);
                void t.offsetWidth; t.classList.add('visible');

                const bar = t.querySelector('.toast-progress');
                bar.style.transition = `width ${ms}ms linear`; bar.style.width = '0%';
                
                const remove = () => { t.classList.remove('visible'); setTimeout(() => t.remove(), 300); };
                t.querySelector('.toast-close').onclick = remove;
                setTimeout(remove, ms);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toast = new ToastSystem();
            let isLoginMode = true;

            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            });

            const switchBtn = document.getElementById('authSwitchAction');
            switchBtn.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                document.getElementById('authTitle').innerText = isLoginMode ? "Welcome Back" : "Create Account";
                document.getElementById('authSubtitle').innerText = isLoginMode ? "Log in to view and save your downloaded videos." : "Create an account to keep track of your videos.";
                document.querySelector('#authSubmitBtn .btn-text').innerText = isLoginMode ? "Log In" : "Sign Up";
                document.getElementById('authSwitchPrompt').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
                switchBtn.innerText = isLoginMode ? "Sign Up" : "Log In";
            });

            const dbUrl = 'https://ncqufcoprwkpjredhlxo.supabase.co'; 
            const dbKey = 'sb_publishable_OxzXsblTjBO1FMcKCbhzKQ_w4zonqru';
            const db = window.supabase.createClient(dbUrl, dbKey);

            function toggleBtnLoading(btn, loading) {
                btn.disabled = loading;
                btn.querySelector('.btn-text').classList.toggle('hidden', loading);
                btn.querySelector('.loader-spinner').classList.toggle('hidden', !loading);
            }

            document.getElementById('authSubmitBtn').addEventListener('click', async (e) => {
                const email = document.getElementById('authEmail').value.trim();
                const pass = document.getElementById('authPassword').value;
                const btn = e.currentTarget;
                
                if (!email || !pass) return toast.show("Please enter your email and password.", "error");

                toggleBtnLoading(btn, true);

                const { error } = isLoginMode 
                    ? await db.auth.signInWithPassword({ email, password: pass })
                    : await db.auth.signUp({ email, password: pass });

                toggleBtnLoading(btn, false);

                if (error) {
                    toast.show(error.message, "error");
                } else {
                    toast.show("Success! Taking you back home...", "success");
                    setTimeout(() => { window.location.href = "/"; }, 1200);
                }
            });

            document.getElementById('googleAuthBtn').addEventListener('click', async () => {
                toast.show("Connecting to Google...", "info");
                const { error } = await db.auth.signInWithOAuth({ 
                    provider: 'google',
                    options: { redirectTo: window.location.origin } 
                });
                if (error) toast.show(`Error: ${error.message}`, "error");
            });
        });
    </script>
</body>
</html>
