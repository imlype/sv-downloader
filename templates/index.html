                        Developer Github

    <main class="main-wrapper">
        <div class="app-card glass-panel">
            <div class="header">

                <p>Paste any video link below to download it without watermarks.</p>
            </div>
            
            <div class="input-group">
                <div class="input-wrapper">
                    <svg class="input-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    <input type="url" id="videoUrlInput" class="custom-input" placeholder="Paste link here..." autocomplete="off">
                    <button class="clear-input-btn hidden" id="clearUrlBtn">✕</button>
                </div>
                
                <button id="executeDownloadBtn" class="btn btn-primary btn-large">
                    <span class="btn-text">Download Video</span>
                    <div class="loader-spinner hidden"></div>
                </button>
            </div>
        </div>

    <footer class="site-footer">
        <a href="https://github.com/imlype" target="_blank" class="github-btn">
            <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            imlype
        </a>
    </footer>

    <script>
        class ParticleEngine {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.init();
                this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            init() {
                this.particles = [];
                const count = window.innerWidth < 768 ? 35 : 80;
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.8, vy: (Math.random() - 0.5) * 0.8,
                        radius: Math.random() * 2.5 + 1
                    });
                }
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
                this.ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 0, 0, 0.15)';
                this.ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.05)';

                for (let i = 0; i < this.particles.length; i++) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); this.ctx.fill();

                    for (let j = i + 1; j < this.particles.length; j++) {
                        const p2 = this.particles[j];
                        const dx = p.x - p2.x; const dy = p.y - p2.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 120) {
                            this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y); this.ctx.lineTo(p2.x, p2.y); this.ctx.stroke();
                        }
                    }
                }
            }
        }

        class ToastSystem {
            constructor() { this.container = document.getElementById('toastContainer'); }
            show(msg, type = 'info', ms = 5000) {
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                let icon = '';
                if(type === 'success') icon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                else if(type === 'error') icon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                else icon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';

                t.innerHTML = `
                    <div class="toast-icon">${icon}</div>
                    <div class="toast-content">
                        <div class="toast-title">${type.toUpperCase()}</div>
                        <div class="toast-msg">${msg}</div>
                    </div>
                    <button class="toast-close">✕</button>
                    <div class="toast-progress"></div>
                `;
                this.container.appendChild(t);
                void t.offsetWidth; t.classList.add('visible');

                const bar = t.querySelector('.toast-progress');
                bar.style.transition = `width ${ms}ms linear`; bar.style.width = '0%';
                
                const remove = () => { t.classList.remove('visible'); setTimeout(() => t.remove(), 400); };
                t.querySelector('.toast-close').onclick = remove;
                setTimeout(remove, ms);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ParticleEngine();
            const toast = new ToastSystem();

            const menuBtn = document.getElementById('menuTriggerBtn');
            const dropdown = document.getElementById('mainDropdown');
            menuBtn.addEventListener('click', () => dropdown.classList.toggle('active'));
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) dropdown.classList.remove('active');
            });

            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
            themeBtn.addEventListener('click', () => {
                const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
                localStorage.setItem('theme', isLight ? 'dark' : 'light');
            });

            const urlInput = document.getElementById('videoUrlInput');
            const clearBtn = document.getElementById('clearUrlBtn');
            urlInput.addEventListener('input', () => { clearBtn.classList.toggle('hidden', urlInput.value.length === 0); });
            clearBtn.addEventListener('click', () => { urlInput.value = ''; clearBtn.classList.add('hidden'); });

            const dbUrl = 'https://ncqufcoprwkpjredhlxo.supabase.co'; 
            const dbKey = 'sb_publishable_OxzXsblTjBO1FMcKCbhzKQ_w4zonqru';
            const db = window.supabase.createClient(dbUrl, dbKey);
            let activeUser = null;

            async function checkSession() {
                try {
                    const { data: { session } } = await db.auth.getSession();
                    if (session) {
                        activeUser = session.user;
                        const initials = activeUser.email.substring(0,2).toUpperCase();
                        document.getElementById('authContainer').innerHTML = `
                            <div class="user-pill dropdown-wrapper">
                                <div class="avatar-circle">${initials}</div>
                                <span class="user-email-truncate">${activeUser.email}</span>
                                <button class="btn btn-outline btn-sm" style="margin-left:8px" id="logoutBtn">Log Out</button>
                            </div>
                        `;
                        document.getElementById('logoutBtn').addEventListener('click', async () => {
                            await db.auth.signOut();
                            window.location.reload();
                        });
                    }
                } catch (e) { console.error("Session Error:", e); }
            }
            checkSession();

            document.getElementById('executeDownloadBtn').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                const url = urlInput.value.trim();
                
                if (!url) return toast.show("Please enter a valid video link.", "error");

                btn.disabled = true;
                btn.querySelector('.btn-text').classList.add('hidden');
                btn.querySelector('.loader-spinner').classList.remove('hidden');
                toast.show("Fetching video details...", "info", 4000);

                try {
                    const req = await fetch('/api/extract', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url })
                    });

                    if (!req.ok) {
                        const err = await req.json();
                        throw new Error(err.error || "Server failed to process link.");
                    }

                    const payload = await req.json();

                    if (activeUser) {
                        await db.from('downloads').insert([{
                            user_id: activeUser.id,
                            video_url: payload.original_url,
                            creator: payload.creator,
                            description: payload.description,
                            thumbnail: payload.thumbnail
                        }]);
                    }

                    toast.show("Success! Download starting...", "success");
                    window.location.href = `/api/download/${payload.id}?title=${encodeURIComponent(payload.title)}`;
                    urlInput.value = ''; clearBtn.classList.add('hidden');

                } catch (err) {
                    toast.show(`Error: ${err.message}`, "error");
                } finally {
                    btn.disabled = false;
                    btn.querySelector('.btn-text').classList.remove('hidden');
                    btn.querySelector('.loader-spinner').classList.add('hidden');
                }
            });
        });
    </script>
</body>
