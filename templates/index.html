<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Downloader Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=102">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>

    <nav class="top-nav">
        <a href="/" class="nav-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span class="brand-text">SV Downloader</span>
        </a>
        
        <div class="nav-controls">
            <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
                <svg class="sun-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            
            <div id="authContainer">
                <a href="/login" class="btn btn-outline">Log In</a>
            </div>

            <div class="dropdown-wrapper">
                <button class="icon-btn" id="menuTriggerBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div id="mainDropdown" class="dropdown-menu">
                    <div class="dropdown-header">Menu</div>
                    <a href="/" class="dropdown-item">Download Video</a>
                    <a href="/recent" class="dropdown-item">My Videos</a>
                    <div class="dropdown-divider"></div>
                    <a href="https://github.com/imlype" target="_blank" class="dropdown-item">Developer Github</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-wrapper">
        <div class="app-card">
            <div class="header">
                <h1>Download Videos</h1>
                <p>Paste any video link below to download it without watermarks.</p>
            </div>
            
            <div class="input-group">
                <div class="input-wrapper">
                    <input type="url" id="videoUrlInput" class="custom-input" placeholder="Paste link here..." autocomplete="off">
                    <button class="clear-input-btn hidden" id="clearUrlBtn">✕</button>
                </div>
                
                <button id="executeDownloadBtn" class="btn btn-primary btn-large full-width">
                    <span class="btn-text">Download Video</span>
                    <div class="loader-spinner hidden"></div>
                </button>
            </div>
        </div>
    </main>

    <script>
        class ToastSystem {
            constructor() { this.container = document.getElementById('toastContainer'); }
            show(msg, type = 'info', ms = 4000) {
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                t.innerHTML = `
                    <div class="toast-content">
                        <div class="toast-title">${type === 'error' ? 'Error' : type === 'success' ? 'Success' : 'Notice'}</div>
                        <div class="toast-msg">${msg}</div>
                    </div>
                    <button class="toast-close">✕</button>
                    <div class="toast-progress"></div>
                `;
                this.container.appendChild(t);
                void t.offsetWidth; t.classList.add('visible');

                const bar = t.querySelector('.toast-progress');
                bar.style.transition = `width ${ms}ms linear`; bar.style.width = '0%';
                
                const remove = () => { t.classList.remove('visible'); setTimeout(() => t.remove(), 300); };
                t.querySelector('.toast-close').onclick = remove;
                setTimeout(remove, ms);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toast = new ToastSystem();

            const menuBtn = document.getElementById('menuTriggerBtn');
            const dropdown = document.getElementById('mainDropdown');
            menuBtn.addEventListener('click', () => dropdown.classList.toggle('active'));
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) dropdown.classList.remove('active');
            });

            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            });

            const urlInput = document.getElementById('videoUrlInput');
            const clearBtn = document.getElementById('clearUrlBtn');
            urlInput.addEventListener('input', () => { clearBtn.classList.toggle('hidden', urlInput.value.length === 0); });
            clearBtn.addEventListener('click', () => { urlInput.value = ''; clearBtn.classList.add('hidden'); });

            const dbUrl = 'https://ncqufcoprwkpjredhlxo.supabase.co'; 
            const dbKey = 'sb_publishable_OxzXsblTjBO1FMcKCbhzKQ_w4zonqru';
            const db = window.supabase.createClient(dbUrl, dbKey);
            let activeUser = null;

            async function checkSession() {
                try {
                    const { data: { session } } = await db.auth.getSession();
                    if (session) {
                        activeUser = session.user;
                        const initials = activeUser.email.substring(0,2).toUpperCase();
                        document.getElementById('authContainer').innerHTML = `
                            <div class="user-pill">
                                <div class="avatar-circle">${initials}</div>
                                <span class="user-email-truncate">${activeUser.email}</span>
                                <button class="btn btn-outline btn-sm" style="margin-left:10px; border:none;" id="logoutBtn">Log Out</button>
                            </div>
                        `;
                        document.getElementById('logoutBtn').addEventListener('click', async () => {
                            await db.auth.signOut();
                            window.location.reload();
                        });
                    }
                } catch (e) { console.error("Session Error:", e); }
            }
            checkSession();

            document.getElementById('executeDownloadBtn').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                const url = urlInput.value.trim();
                
                if (!url) return toast.show("Please enter a valid video link.", "error");

                btn.disabled = true;
                btn.querySelector('.btn-text').classList.add('hidden');
                btn.querySelector('.loader-spinner').classList.remove('hidden');
                toast.show("Fetching video details...", "info", 4000);

                try {
                    const req = await fetch('/api/extract', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url })
                    });

                    if (!req.ok) {
                        const err = await req.json();
                        throw new Error(err.error || "Server failed to process link.");
                    }

                    const payload = await req.json();

                    if (activeUser) {
                        await db.from('downloads').insert([{
                            user_id: activeUser.id,
                            video_url: payload.original_url,
                            creator: payload.creator,
                            description: payload.description,
                            thumbnail: payload.thumbnail
                        }]);
                    }

                    toast.show("Success! Download starting...", "success");
                    window.location.href = `/api/download/${payload.id}?title=${encodeURIComponent(payload.title)}`;
                    urlInput.value = ''; clearBtn.classList.add('hidden');

                } catch (err) {
                    toast.show(`Error: ${err.message}`, "error");
                } finally {
                    btn.disabled = false;
                    btn.querySelector('.btn-text').classList.remove('hidden');
                    btn.querySelector('.loader-spinner').classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
